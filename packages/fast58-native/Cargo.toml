[package]
name = "fast58"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[build-dependencies]
napi-build = "2"

[dependencies]
napi = "3"
napi-derive = "3"
bs58 = "0.5.1"
fd_bs58 = "0.1.0"
five8 = "1.0.0"

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
panic = "abort"
strip = true
